services:
  - type: web
    name: obiter-minuta-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: REDIS_URL
        fromService:
          name: obiter-minuta-redis
          type: redis
          property: connectionString
      - key: DATABASE_URL
        sync: false
      - key: JOB_TTL_MINUTES
        value: "15"
      - key: RESULT_TTL_HOURS
        value: "2"
      - key: MAX_PDF_SIZE_MB
        value: "50"
      - key: MAX_PAGES
        value: "150"
      - key: LOG_LEVEL
        value: INFO
      - key: SENTRY_DSN
        sync: false

  - type: worker
    name: obiter-minuta-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    dockerCommand: celery -A app.tasks.process worker --loglevel=info --concurrency=2
    envVars:
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        fromService:
          name: obiter-minuta-api
          type: web
          envVarKey: SECRET_KEY
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: REDIS_URL
        fromService:
          name: obiter-minuta-redis
          type: redis
          property: connectionString
      - key: DATABASE_URL
        sync: false
      - key: JOB_TTL_MINUTES
        value: "15"
      - key: RESULT_TTL_HOURS
        value: "2"
      - key: MAX_PDF_SIZE_MB
        value: "50"
      - key: MAX_PAGES
        value: "150"
      - key: LOG_LEVEL
        value: INFO

  - type: redis
    name: obiter-minuta-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
