# Render — apenas a API web
# Worker está no Fly.io (fly.toml)
# Redis está no Upstash (URL externa nas envVars)
# PostgreSQL está no Neon

services:
  - type: web
    name: obiter-minuta-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: REDIS_URL
        sync: false  # Upstash URL externa
      - key: DATABASE_URL
        sync: false  # Neon URL
      - key: JOB_TTL_MINUTES
        value: "15"
      - key: RESULT_TTL_HOURS
        value: "2"
      - key: MAX_PDF_SIZE_MB
        value: "50"
      - key: MAX_PAGES
        value: "150"
      - key: LOG_LEVEL
        value: INFO
      - key: SENTRY_DSN
        sync: false
